name: 33STYLE_Auto_Rename

on:
  push:
    branches:
      - main
    paths:
      - 'processed_images/**'
      - 'process.py'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 抓完整 repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 顯示當前檔案（debug用）
        run: |
          echo "📂 當前目錄："
          pwd
          echo "📄 檔案列表："
          ls -R

      - name: 3. 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 4. 安裝 SDK
        run: pip install google-genai

      - name: 5. 執行 AI（確認新版有跑）
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 準備執行 process.py"
          python process.py

      - name: 6. 自動 commit + push（最穩版本）
        run: |
          git config user.name "33STYLE-Bot"
          git config user.email "bot@33style.com"

          git add .

          # 如果沒有變更就跳過（避免無限觸發）
          if git diff --staged --quiet; then
            echo "✅ 沒有變更，跳過 commit"
            exit 0
          fi

          git commit -m "🤖 AI 改名完成"

          # 嘗試推送（失敗就自動補救）
          git push origin main || (
            echo "⚠️ push 失敗，開始同步"
            git pull --rebase origin main
            git push origin main
          )
