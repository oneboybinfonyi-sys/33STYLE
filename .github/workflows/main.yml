name: 33STYLE_Auto_Rename

on:
  push:
    paths:
      - 'processed_images/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 抓完整 repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. 安裝 SDK
        run: pip install google-genai

      - name: 4. 執行 AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python process.py

      - name: 5. 強制同步並推送（終極穩定版）
        run: |
          git config user.name "33STYLE-Bot"
          git config user.email "bot@33style.com"

          git add .

          # ✅ 先抓遠端（避免 rejected）
          git fetch origin main

          # ✅ 強制 rebase（不會產生 merge commit）
          git rebase origin/main || true

          # ✅ 有變更才 commit
          git diff --staged --quiet || git commit -m "🤖 AI 改名完成"

          # ✅ 關鍵：如果 push 失敗 → 自動再試一次
          git push origin main || (
            echo "⚠️ push 失敗，重新同步後再推一次"
            git pull --rebase origin main
            git push origin main
          )
