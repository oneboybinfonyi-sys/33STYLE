name: 33STYLE_Auto_Rename
on:
  push:
    paths:
      - 'processed_images/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup_Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install_New_SDK
        run: pip install google-genai

      - name: Run_AI_Process
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python process.py

      - name: Sync_and_Push
        run: |
          git config user.name "33STYLE-Bot"
          git config user.email "bot@33style.com"
          git add .
          git pull --rebase origin main
          git diff --staged --quiet || git commit -m "🤖 AI 自動化改名完成"
          git push origin main
