name: 33STYLE Auto Rename
on:
  push:
    paths:
      - 'processed_images/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保機器人有寫入權限
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整紀錄以利同步

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-genai

      - name: Run AI Rename
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python process.py

      - name: Commit and Push changes
        run: |
          git config user.name "33STYLE-Bot"
          git config user.email "bot@33style.com"
          git add .
          # 先 pull 遠端變更並合併，解決 rejected 衝突
          git pull --rebase origin main
          git diff --staged --quiet || git commit -m "🤖 AI 自動辨識改名 (SDK v2)"
          git push origin main
