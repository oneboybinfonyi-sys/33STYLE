name: 33STYLE Auto Rename
on:
  push:
    paths:
      - 'processed_images/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 升級 Python 版本
      - name: Install dependencies
        run: pip install google-genai # 安裝最新的 Gen AI 套件
      - name: Run AI Rename
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python process.py
      - name: Commit changes
        run: |
          git config user.name "33STYLE-Bot"
          git config user.email "bot@33style.com"
          git add .
          git diff --staged --quiet || git commit -m "🤖 AI 自動辨識改名完成 (SDK v2)"
          git push
